services:
  influxdb:
    image: influxdb:2
    container_name: influxdb_s2
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin_tilapia
      - DOCKER_INFLUXDB_INIT_PASSWORD=password_s2_tilapia
      - DOCKER_INFLUXDB_INIT_ORG=S2_Project
      - DOCKER_INFLUXDB_INIT_BUCKET=tilapia_monitoring
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1:8086/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_s2
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    restart: always

  backend:
    build: ./backend
    container_name: tilapia_backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      INFLUX_URL: http://influxdb:8086
      CORS_ORIGINS: http://localhost:5173,http://localhost:8081,http://127.0.0.1:5173,http://127.0.0.1:8081
    depends_on:
      influxdb:
        condition: service_healthy
    restart: always
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: tilapia_frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: always

volumes:
  influxdb_data:
  grafana_data:
