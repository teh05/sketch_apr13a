version: "3.8"

services:
  influxdb:
    image: influxdb:2
    container_name: influxdb_s2
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin_tilapia
      - DOCKER_INFLUXDB_INIT_PASSWORD=password_s2_tilapia
      - DOCKER_INFLUXDB_INIT_ORG=S2_Project
      - DOCKER_INFLUXDB_INIT_BUCKET=tilapia_monitoring
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_s2
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb
    restart: always

volumes:
  influxdb_data:
  grafana_data:
